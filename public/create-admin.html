<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer Admin - Immobilier App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #27ae60;
            margin-bottom: 30px;
            text-align: center;
        }
        .btn-submit {
            background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
            color: white;
            width: 100%;
            padding: 12px;
            font-weight: 600;
            border: none;
            border-radius: 5px;
        }
        .alert {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1><i class="fas fa-user-shield"></i> Créer un Admin</h1>
        
        <div id="successMessage" class="alert alert-success" style="display: none;"></div>
        <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>

        <form id="createAdminForm">
            <div class="form-group mb-3">
                <label for="nom">Nom</label>
                <input type="text" class="form-control" id="nom" required>
            </div>

            <div class="form-group mb-3">
                <label for="prenom">Prénom</label>
                <input type="text" class="form-control" id="prenom" required>
            </div>

            <div class="form-group mb-3">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>

            <div class="form-group mb-3">
                <label for="password">Mot de passe</label>
                <input type="password" class="form-control" id="password" required>
            </div>

            <div class="form-group mb-3">
                <label for="telephone">Téléphone</label>
                <input type="tel" class="form-control" id="telephone">
            </div>

            <button type="submit" class="btn-submit">Créer l'admin</button>
        </form>

        <hr>
        <p class="text-center text-muted">
            <small>Après création, cet utilisateur pourra se connecter et accéder au panneau admin.</small>
        </p>
    </div>

    <script>
        // Vérification que l'utilisateur est superadmin
        const adminToken = localStorage.getItem('adminToken');
        const adminUser = JSON.parse(localStorage.getItem('adminUser') || '{}');
        if (!adminToken || adminUser.role !== 'superadmin') {
            window.location.href = '/admin-login.html';
        }

        const form = document.getElementById('createAdminForm');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';

            try {
                const response = await fetch('/api/auth/create-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nom: document.getElementById('nom').value,
                        prenom: document.getElementById('prenom').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        telephone: document.getElementById('telephone').value
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    successMessage.textContent = '✅ Admin créé avec succès! Cet utilisateur peut maintenant se connecter.';
                    successMessage.style.display = 'block';
                    form.reset();
                } else {
                    errorMessage.textContent = data.message || 'Erreur lors de la création';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('Erreur:', error);
                errorMessage.textContent = 'Erreur de connexion au serveur';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
