<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilisateurs - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { background: #f8f9fa; }
        .table thead { background: #27ae60; color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin-panel.html">🏠 Admin</a>
            <span class="navbar-text ms-auto" id="adminName"></span>
            <button class="btn btn-outline-danger ms-3" onclick="logout()">Déconnexion</button>
        </div>
    </nav>
    <div class="container mt-4">
        <h2 class="mb-3">Utilisateurs</h2>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Téléphone</th>
                        <th>Rôle</th>
                        <th>Date création</th>
                    </tr>
                </thead>
                <tbody id="usersBody">
                    <tr><td colspan="5" class="text-center text-muted">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const adminToken = localStorage.getItem('adminToken');
        const adminUser = JSON.parse(localStorage.getItem('adminUser') || '{}');
        if (!adminToken) window.location.href = '/admin-login.html';
        document.getElementById('adminName').textContent = adminUser.prenom ? `👤 ${adminUser.prenom} ${adminUser.nom}` : '';

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = '/admin-login.html';
        }

        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await response.json();
                const tbody = document.getElementById('usersBody');
                if (data.success && data.users.length > 0) {
                    tbody.innerHTML = data.users.map(user => `
                        <tr>
                            <td>${user.nom} ${user.prenom}</td>
                            <td>${user.email}</td>
                            <td>${user.telephone || '-'}</td>
                            <td><span class="badge bg-info">${user.role}</span></td>
                            <td>${new Date(user.createdAt).toLocaleDateString('fr-FR')}</td>
                            <td>
                                <button class="btn btn-sm btn-danger" onclick="deleteUser('${user._id}', '${user.nom} ${user.prenom}')">Supprimer</button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Aucun utilisateur trouvé</td></tr>';
                }
                    async function deleteUser(userId, userName) {
                        if (!confirm(`Supprimer l'utilisateur ${userName} ?`)) return;
                        try {
                            const response = await fetch(`/api/admin/users/${userId}`, {
                                method: 'DELETE',
                                headers: { 'Authorization': `Bearer ${adminToken}` }
                            });
                            const data = await response.json();
                            if (data.success) {
                                alert('Utilisateur supprimé.');
                                loadUsers();
                            } else {
                                alert(data.message || 'Erreur lors de la suppression');
                            }
                        } catch (e) {
                            alert('Erreur lors de la suppression');
                        }
                    }
            } catch (e) {
                document.getElementById('usersBody').innerHTML = '<tr><td colspan="5" class="text-center text-danger">Erreur lors du chargement</td></tr>';
            }
        }

        window.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
