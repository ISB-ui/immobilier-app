<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrateurs - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { background: #f8f9fa; }
        .table thead { background: #34495e; color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin-panel.html">🏠 Admin</a>
            <span class="navbar-text ms-auto" id="adminName"></span>
            <button class="btn btn-outline-danger ms-3" onclick="logout()">Déconnexion</button>
        </div>
    </nav>
    <div class="container mt-4">
        <h2 class="mb-3">Administrateurs</h2>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Téléphone</th>
                        <th>Date création</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminsBody">
                    <tr><td colspan="5" class="text-center text-muted">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const adminToken = localStorage.getItem('adminToken');
        const adminUser = JSON.parse(localStorage.getItem('adminUser') || '{}');
        if (!adminToken) window.location.href = '/admin-login.html';
        document.getElementById('adminName').textContent = adminUser.prenom ? `👤 ${adminUser.prenom} ${adminUser.nom}` : '';

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = '/admin-login.html';
        }

        async function loadAdmins() {
            try {
                const response = await fetch('/api/admin/admins', {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await response.json();
                const tbody = document.getElementById('adminsBody');
                if (data.success && data.admins.length > 0) {
                    tbody.innerHTML = data.admins.map(admin => `
                        <tr>
                            <td>${admin.nom} ${admin.prenom}</td>
                            <td>${admin.email}</td>
                            <td>${admin.telephone || '-'}</td>
                            <td>${new Date(admin.createdAt).toLocaleDateString('fr-FR')}</td>
                            <td>
                                <button class="btn btn-sm btn-danger" onclick="deleteAdmin('${admin._id}', '${admin.nom} ${admin.prenom}')">Supprimer</button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Aucun administrateur trouvé</td></tr>';
                }
            } catch (e) {
                document.getElementById('adminsBody').innerHTML = '<tr><td colspan="5" class="text-center text-danger">Erreur lors du chargement</td></tr>';
            }
        }

        async function deleteAdmin(adminId, adminName) {
            if (!confirm(`Supprimer l'administrateur ${adminName} ?`)) return;
            try {
                const response = await fetch(`/api/admin/admins/${adminId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await response.json();
                if (data.success) {
                    alert('Administrateur supprimé.');
                    loadAdmins();
                } else {
                    alert(data.message || 'Erreur lors de la suppression');
                }
            } catch (e) {
                alert('Erreur lors de la suppression');
            }
        }

        window.addEventListener('DOMContentLoaded', loadAdmins);
    </script>
</body>
</html>
