<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - Immobilier App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #1e8449;
        }

        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }

        .login-header p {
            color: #666;
            margin: 0;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 15px;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(39, 174, 96, 0.25);
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.3);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .spinner-border {
            width: 1rem;
            height: 1rem;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 Admin Panel</h1>
            <p>Connexion administrateur sécurisée</p>
        </div>

        <div id="alertContainer"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">📧 Email</label>
                <input 
                    type="email" 
                    class="form-control" 
                    id="email" 
                    placeholder="votre.email@example.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password" class="form-label">🔑 Mot de passe</label>
                <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    placeholder="Votre mot de passe"
                    required
                >
            </div>

            <button type="submit" class="btn-login" id="submitBtn">
                Se connecter
            </button>
        </form>

        <hr style="margin: 20px 0; color: #e0e0e0;">

        <div style="text-align: center; font-size: 14px; color: #666;">
            <p>❓ Pas encore de compte admin ?</p>
            <a href="/create-admin.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">
                ➜ Créer un compte admin
            </a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const alertContainer = document.getElementById('alertContainer');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('Veuillez remplir tous les champs', 'danger');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border"></span>Connexion...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    showAlert(data.message || 'Erreur lors de la connexion', 'danger');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Se connecter';
                    return;
                }

                // Vérifier le rôle et rediriger vers le bon panneau
                if (data.user.role === 'superadmin') {
                    // Redirection vers le panneau superadmin
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.user));
                    showAlert('✅ Connexion réussie ! Redirection vers le panneau super-admin...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = '/superadmin-panel.html';
                    }, 1000);
                } else if (data.user.role === 'admin') {
                    // Redirection vers le panneau admin classique
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.user));
                    showAlert('✅ Connexion réussie ! Redirection vers le panneau admin...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = '/admin-panel.html';
                    }, 1000);
                } else {
                    showAlert('❌ Accès refusé. Seuls les administrateurs peuvent se connecter ici.', 'danger');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Se connecter';
                    return;
                }

            } catch (error) {
                console.error('Erreur:', error);
                showAlert('Erreur de connexion. Vérifiez votre connexion internet.', 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Se connecter';
            }
        });

        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}" role="alert">
                    ${message}
                </div>
            `;
        }

        // Vérifier si déjà connecté
        window.addEventListener('load', () => {
            const token = localStorage.getItem('adminToken');
            const user = JSON.parse(localStorage.getItem('adminUser') || '{}');
            if (token) {
                window.location.href = '/admin-panel.html';
            }
            // masquer le lien de création si ce n'est pas un superadmin
            const createLink = document.querySelector('a[href="/create-admin.html"]');
            if (createLink && user.role !== 'superadmin') {
                createLink.style.display = 'none';
            }
        });
    </script>
</body>
</html>
