<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail annonce - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { background: #f8f9fa; }
        .badge-attente { background: #f39c12; color: #fff; }
        .badge-validee { background: #27ae60; color: #fff; }
        .badge-refusee { background: #e74c3c; color: #fff; }
        .img-thumb { max-width: 120px; max-height: 90px; object-fit: cover; border-radius: 6px; margin-right: 8px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin-panel.html">🏠 Admin</a>
            <span class="navbar-text ms-auto" id="adminName"></span>
            <button class="btn btn-outline-danger ms-3" onclick="logout()">Déconnexion</button>
        </div>
    </nav>
    <div class="container mt-4" id="mainContent">
        <div class="text-center text-muted">Chargement...</div>
    </div>
    <script>
        const adminToken = localStorage.getItem('adminToken');
        const adminUser = JSON.parse(localStorage.getItem('adminUser') || '{}');
        if (!adminToken) window.location.href = '/admin-login.html';
        document.getElementById('adminName').textContent = adminUser.prenom ? `👤 ${adminUser.prenom} ${adminUser.nom}` : '';

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = '/admin-login.html';
        }

        function getStatutBadge(statut) {
            if (statut === 'En attente') return '<span class="badge badge-attente">En attente</span>';
            if (statut === 'Validée') return '<span class="badge badge-validee">Validée</span>';
            if (statut === 'Refusée') return '<span class="badge badge-refusee">Refusée</span>';
            return '';
        }

        function getQueryParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }

        async function loadAnnonce() {
            const id = getQueryParam('id');
            if (!id) {
                document.getElementById('mainContent').innerHTML = '<div class="alert alert-danger">ID annonce manquant</div>';
                return;
            }
            try {
                const response = await fetch(`/api/admin/annonces?id=${id}`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await response.json();
                if (!data.success || !data.annonces || !data.annonces.length) {
                    document.getElementById('mainContent').innerHTML = '<div class="alert alert-danger">Annonce introuvable</div>';
                    return;
                }
                const annonce = data.annonces[0];
                document.getElementById('mainContent').innerHTML = `
                    <div class="card mb-4">
                        <div class="card-body">
                            <h3>${annonce.titre}</h3>
                            <div class="mb-2">${getStatutBadge(annonce.statut)}</div>
                            <div class="mb-2"><strong>Type :</strong> ${annonce.typeBien} | <strong>Transaction :</strong> ${annonce.typeTransaction}</div>
                            <div class="mb-2"><strong>Prix :</strong> ${annonce.prix.toLocaleString()} FCFA</div>
                            <div class="mb-2"><strong>Adresse :</strong> ${annonce.adresse}</div>
                            <div class="mb-2"><strong>Quartier :</strong> ${annonce.quartier}</div>
                            <div class="mb-2"><strong>Description :</strong> ${annonce.description}</div>
                            <div class="mb-2"><strong>Images :</strong><br>
                                ${(annonce.images||[]).map(img => `<img src="${img}" class="img-thumb" alt="photo">`).join('')}
                            </div>
                            <div class="mb-2"><strong>Propriétaire :</strong> ${annonce.proprietaire?.nom || ''} ${annonce.proprietaire?.prenom || ''} (${annonce.proprietaire?.email || ''})</div>
                            <div class="mb-2"><strong>Téléphone :</strong> ${annonce.proprietaire?.telephone || '-'}</div>
                            <div class="mb-2"><strong>Date création :</strong> ${new Date(annonce.dateCreation).toLocaleString('fr-FR')}</div>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        ${annonce.statut === 'En attente' ? `<button class="btn btn-success" onclick="validerAnnonce('${annonce._id}')">✅ Valider</button>` : ''}
                        ${annonce.statut === 'En attente' ? `<button class="btn btn-danger" onclick="refuserAnnonce('${annonce._id}')">❌ Refuser</button>` : ''}
                        <a href="/admin-annonces.html" class="btn btn-secondary">Retour à la liste</a>
                    </div>
                    <div id="adminActionMsg" class="mt-3"></div>
                `;
            } catch (e) {
                document.getElementById('mainContent').innerHTML = '<div class="alert alert-danger">Erreur lors du chargement</div>';
            }
        }

        async function validerAnnonce(id) {
            if (!confirm('Valider cette annonce ?')) return;
            try {
                const response = await fetch(`/api/admin/annonces/${id}/valider`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('adminActionMsg').innerHTML = '<div class="alert alert-success">Annonce validée !</div>';
                    loadAnnonce();
                } else {
                    document.getElementById('adminActionMsg').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                }
            } catch (e) {
                document.getElementById('adminActionMsg').innerHTML = '<div class="alert alert-danger">Erreur lors de la validation</div>';
            }
        }

        async function refuserAnnonce(id) {
            const raison = prompt('Raison du refus ?');
            if (!raison) return;
            try {
                const response = await fetch(`/api/admin/annonces/${id}/refuser`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${adminToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raison })
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('adminActionMsg').innerHTML = '<div class="alert alert-success">Annonce refusée !</div>';
                    loadAnnonce();
                } else {
                    document.getElementById('adminActionMsg').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                }
            } catch (e) {
                document.getElementById('adminActionMsg').innerHTML = '<div class="alert alert-danger">Erreur lors du refus</div>';
            }
        }

        window.addEventListener('DOMContentLoaded', loadAnnonce);
    </script>
</body>
</html>
