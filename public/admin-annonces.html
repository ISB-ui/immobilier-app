<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annonces à valider - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { background: #f8f9fa; }
        .table thead { background: #27ae60; color: #fff; }
        .badge-attente { background: #f39c12; color: #fff; }
        .badge-validee { background: #27ae60; color: #fff; }
        .badge-refusee { background: #e74c3c; color: #fff; }
        .action-btn { margin-right: 5px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin-panel.html">🏠 Admin</a>
            <span class="navbar-text ms-auto" id="adminName"></span>
            <button class="btn btn-outline-danger ms-3" onclick="logout()">Déconnexion</button>
        </div>
    </nav>
    <div class="container mt-4">
        <h2 class="mb-3">Annonces à valider</h2>
        <div class="mb-3 d-flex flex-wrap gap-2">
            <select id="filterStatut" class="form-select w-auto">
                <option value="">Tous statuts</option>
                <option value="En attente">En attente</option>
                <option value="Validée">Validée</option>
                <option value="Refusée">Refusée</option>
            </select>
            <select id="filterTypeBien" class="form-select w-auto">
                <option value="">Tous types</option>
                <option value="Appartement">Appartement</option>
                <option value="Maison">Maison</option>
                <option value="Terrain">Terrain</option>
            </select>
            <select id="filterTransaction" class="form-select w-auto">
                <option value="">Toutes transactions</option>
                <option value="Location">Location</option>
                <option value="Vente">Vente</option>
            </select>
            <button class="btn btn-success" onclick="loadAnnonces()">Filtrer</button>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead>
                    <tr>
                        <th>Titre</th>
                        <th>Propriétaire</th>
                        <th>Type</th>
                        <th>Transaction</th>
                        <th>Prix</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="annoncesBody">
                    <tr><td colspan="7" class="text-center text-muted">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const adminToken = localStorage.getItem('adminToken');
        const adminUser = JSON.parse(localStorage.getItem('adminUser') || '{}');
        if (!adminToken) window.location.href = '/admin-login.html';
        document.getElementById('adminName').textContent = adminUser.prenom ? `👤 ${adminUser.prenom} ${adminUser.nom}` : '';

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = '/admin-login.html';
        }

        function getStatutBadge(statut) {
            if (statut === 'En attente') return '<span class="badge badge-attente">En attente</span>';
            if (statut === 'Validée') return '<span class="badge badge-validee">Validée</span>';
            if (statut === 'Refusée') return '<span class="badge badge-refusee">Refusée</span>';
            return '';
        }

        function getActions(annonce) {
            return `
                <a href="/admin-annonce.html?id=${annonce._id}" class="btn btn-sm btn-primary action-btn">👁️ Voir</a>
            `;
        }

        async function loadAnnonces() {
            const statut = document.getElementById('filterStatut').value;
            const typeBien = document.getElementById('filterTypeBien').value;
            const transaction = document.getElementById('filterTransaction').value;
            let url = '/api/admin/annonces?';
            if (statut) url += `statut=${encodeURIComponent(statut)}&`;
            if (typeBien) url += `typeBien=${encodeURIComponent(typeBien)}&`;
            if (transaction) url += `typeTransaction=${encodeURIComponent(transaction)}&`;
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await response.json();
                const tbody = document.getElementById('annoncesBody');
                if (data.success && data.annonces.length > 0) {
                    tbody.innerHTML = data.annonces.map(annonce => `
                        <tr>
                            <td>${annonce.titre}</td>
                            <td>${annonce.proprietaire?.nom || ''} ${annonce.proprietaire?.prenom || ''}</td>
                            <td>${annonce.typeBien}</td>
                            <td>${annonce.typeTransaction}</td>
                            <td>${annonce.prix.toLocaleString()} FCFA</td>
                            <td>${getStatutBadge(annonce.statut)}</td>
                            <td>${getActions(annonce)}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Aucune annonce trouvée</td></tr>';
                }
            } catch (e) {
                document.getElementById('annoncesBody').innerHTML = '<tr><td colspan="7" class="text-center text-danger">Erreur lors du chargement</td></tr>';
            }
        }

        window.addEventListener('DOMContentLoaded', loadAnnonces);
    </script>
</body>
</html>
